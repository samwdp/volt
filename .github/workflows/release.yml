name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo apt-get install -y build-essential git make \
          pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
          libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
          libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
          libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build volt (release)
        run: cargo build -p volt --release --locked

      - name: Stage release artifact
        shell: pwsh
        run: |
          $releaseAssets = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $releaseAssets | Out-Null
          $ext = if ($env:RUNNER_OS -eq 'Windows') { '.exe' } else { '' }
          $bundleName = "volt-$($env:RUNNER_OS.ToLower())-$($env:RUNNER_ARCH.ToLower()).zip"
          $bundleRoot = Join-Path $releaseAssets "bundle-root"
          $sourceRoot = Join-Path $PWD "target/release"
          $sourceBinary = Join-Path $sourceRoot "volt$ext"
          $sourceAssets = Join-Path $sourceRoot "assets"
          $sourceUser = Join-Path $sourceRoot "user"
          $bundlePath = Join-Path $releaseAssets $bundleName

          New-Item -ItemType Directory -Force -Path $bundleRoot | Out-Null
          Copy-Item -Path $sourceAssets -Destination (Join-Path $bundleRoot "assets") -Recurse
          Copy-Item -Path $sourceUser -Destination (Join-Path $bundleRoot "user") -Recurse
          Copy-Item -Path $sourceBinary -Destination (Join-Path $bundleRoot "volt$ext")

          if (Test-Path $bundlePath) {
            Remove-Item -Path $bundlePath -Force
          }
          Compress-Archive -Path (Join-Path $bundleRoot '*') -DestinationPath $bundlePath

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-release
          path: release-assets/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
