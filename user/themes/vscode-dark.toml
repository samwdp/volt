id = "vscode-dark"
name = "VS Code Dark"

[tokens]
"ui.background" = "#1e1e1e"
"ui.foreground" = "#d4d4d4"
"syntax.attribute" = "#9cdcfe"
"syntax.comment" = "#6a9955"
"syntax.constant" = "#4fc1ff"
"syntax.constant.builtin" = "#569cd6"
"syntax.constructor" = "#4ec9b0"
"syntax.function" = "#dcdcaa"
"syntax.function.macro" = "#dcdcaa"
"syntax.keyword" = "#569cd6"
"syntax.label" = "#c8c8c8"
"syntax.module" = "#4ec9b0"
"syntax.operator" = "#d4d4d4"
"syntax.property" = "#9cdcfe"
"syntax.punctuation.bracket" = "#d4d4d4"
"syntax.punctuation.delimiter" = "#d4d4d4"
"syntax.string" = "#ce9178"
"syntax.type" = "#4ec9b0"
"syntax.type.builtin" = "#569cd6"
"syntax.variable" = "#9cdcfe"
"syntax.variable.builtin" = "#569cd6"
