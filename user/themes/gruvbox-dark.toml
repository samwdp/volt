id = "gruvbox-dark"
name = "Gruvbox Dark"

[tokens]
"ui.background" = "#282828"
"ui.foreground" = "#ebdbb2"
"ui.input.background" = "#282828"
"ui.input.foreground" = "#ebdbb2"
"ui.yank-flash" = "#83a5986e"
# Git status
"git.status.section.header" = "#fe8019"
"git.status.section.count" = "#928374"
"git.status.header.label" = "#83a598"
"git.status.header.value" = "#fabd2f"
"git.status.header.hash" = "#928374"
"git.status.header.summary" = "#ebdbb2"
"git.status.in-progress" = "#8ec07c"
"git.status.entry.added" = "#b8bb26"
"git.status.entry.modified" = "#fe8019"
"git.status.entry.deleted" = "#fb4934"
"git.status.entry.renamed" = "#d3869b"
"git.status.entry.copied" = "#8ec07c"
"git.status.entry.updated" = "#83a598"
"git.status.entry.changed" = "#fabd2f"
"git.status.entry.untracked" = "#fb4934"
"git.status.entry.path" = "#ebdbb2"
"git.status.commit.hash" = "#928374"
"git.status.commit.summary" = "#ebdbb2"
"git.status.stash.name" = "#fe8019"
"git.status.stash.summary" = "#ebdbb2"
"git.status.command" = "#83a598"
"git.status.message" = "#928374"
"syntax.attribute" = "#83a598"
"syntax.comment" = "#928374"
"syntax.constant" = "#d3869b"
"syntax.constant.builtin" = "#d3869b"
"syntax.constructor" = "#8ec07c"
"syntax.function" = "#fabd2f"
"syntax.function.macro" = "#fe8019"
"syntax.keyword" = "#fb4934"
"syntax.label" = "#fb4934"
"syntax.module" = "#b8bb26"
"syntax.operator" = "#fe8019"
"syntax.property" = "#8ec07c"
"syntax.punctuation.bracket" = "#ebdbb2"
"syntax.punctuation.delimiter" = "#ebdbb2"
"syntax.string" = "#b8bb26"
"syntax.type" = "#8ec07c"
"syntax.type.builtin" = "#8ec07c"
"syntax.variable" = "#ebdbb2"
"syntax.variable.builtin" = "#d3869b"

[options]
"ui.line-number.relative" = true
font = "default"
font_size = 18
cursor_roundness = 2
picker_roundness = 16

[langs.rust]
indent = 4
format_on_save = true
use_tabs = false

[langs.markdown]
indent = 0
format_on_save = false
use_tabs = false
