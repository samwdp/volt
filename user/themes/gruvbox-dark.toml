[options]
"ui.line-number.relative" = true
scrolloff = 5
font = "Liga Berkeley Mono"
font_size = 18
cursor_roundness = 2
picker_roundness = 16

[langs.rust]
indent = 4
format_on_save = false
use_tabs = false

[langs.c]
indent = 4
format_on_save = true
use_tabs = false

