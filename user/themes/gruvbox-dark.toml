id = "gruvbox-dark"
name = "Gruvbox Dark"


[pallet]
background = "#101010"
surface = "#282828"
surface-muted = "#3e3e3e"
surface-header = "#404040"
surface-selection = "#424242"
surface-hover-selection = "#484848"
border = "#464646"
border-strong = "#585858"
selection = "#4e4743"
foreground = "#ebdbb2"
foreground-muted = "#9a917b"
foreground-subtle = "#928374"
cursor = "#f9f9f9"
blue = "#83a598"
blue-overlay = "#83a5986e"
green = "#b8bb26"
green-dark = "#98971a"
yellow = "#fabd2f"
red = "#fb4934"
orange = "#fe8019"
aqua = "#8ec07c"
purple = "#d3869b"
transparent = "#00000000"

[tokens]
"ui.background" = "pallet.background"
"ui.foreground" = "pallet.foreground"
"ui.cursor" = "pallet.cursor"
"ui.selection" = "pallet.selection"
"ui.picker.highlight" = "pallet.blue"
"ui.input.background" = "pallet.background"
"ui.input.foreground" = "pallet.foreground"
"ui.autocomplete.background" = "pallet.surface"
"ui.autocomplete.foreground" = "pallet.foreground"
"ui.autocomplete.muted" = "pallet.foreground-muted"
"ui.autocomplete.border" = "pallet.border"
"ui.autocomplete.selection" = "pallet.surface-selection"
"ui.autocomplete.documentation.background" = "pallet.surface-muted"
"ui.hover.background" = "pallet.surface"
"ui.hover.foreground" = "pallet.foreground"
"ui.hover.muted" = "pallet.foreground-muted"
"ui.hover.border" = "pallet.border"
"ui.hover.focused.border" = "pallet.border-strong"
"ui.hover.header.background" = "pallet.surface-header"
"ui.hover.selection" = "pallet.surface-hover-selection"
"ui.yank-flash" = "pallet.blue-overlay"
"ui.statusline.active" = "pallet.blue"
"ui.statusline.inactive" = "pallet.foreground-subtle"
"ui.notification.background" = "pallet.surface"
"ui.notification.foreground" = "pallet.foreground"
"ui.notification.title" = "pallet.foreground"
"ui.notification.muted" = "pallet.foreground-muted"
"ui.notification.border" = "pallet.border"
"ui.notification.progress.background" = "pallet.surface-header"
