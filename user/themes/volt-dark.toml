id = "volt-dark"
name = "Volt Dark"

[tokens]
"ui.background" = "#181b22"
"ui.foreground" = "#d7dde8"
"ui.input.background" = "#181b22"
"ui.input.foreground" = "#d7dde8"
"ui.yank-flash" = "#61afef6e"
"ui.statusline.active" = "#6eaaff"
"ui.statusline.inactive" = "#5c6370"
# Git status
"git.status.section.header" = "#d19a66"
"git.status.section.count" = "#5c6370"
"git.status.header.label" = "#61afef"
"git.status.header.value" = "#e5c07b"
"git.status.header.hash" = "#5c6370"
"git.status.header.summary" = "#d7dde8"
"git.status.in-progress" = "#56b6c2"
"git.status.entry.added" = "#98c379"
"git.status.entry.modified" = "#d19a66"
"git.status.entry.deleted" = "#e06c75"
"git.status.entry.renamed" = "#c678dd"
"git.status.entry.copied" = "#56b6c2"
"git.status.entry.updated" = "#61afef"
"git.status.entry.changed" = "#e5c07b"
"git.status.entry.untracked" = "#e06c75"
"git.status.entry.path" = "#d7dde8"
"git.status.commit.hash" = "#5c6370"
"git.status.commit.summary" = "#d7dde8"
"git.status.stash.name" = "#d19a66"
"git.status.stash.summary" = "#d7dde8"
"git.status.command" = "#61afef"
"git.status.message" = "#5c6370"
"syntax.attribute" = "#61afef"
"syntax.comment" = "#5c6370"
"syntax.constant" = "#d19a66"
"syntax.constant.builtin" = "#d19a66"
"syntax.constructor" = "#c678dd"
"syntax.function" = "#61afef"
"syntax.function.macro" = "#56b6c2"
"syntax.keyword" = "#c678dd"
"syntax.label" = "#e06c75"
"syntax.module" = "#e5c07b"
"syntax.operator" = "#56b6c2"
"syntax.property" = "#e06c75"
"syntax.punctuation.bracket" = "#abb2bf"
"syntax.punctuation.delimiter" = "#abb2bf"
"syntax.string" = "#98c379"
"syntax.type" = "#e5c07b"
"syntax.type.builtin" = "#e5c07b"
"syntax.variable" = "#e06c75"
"syntax.variable.builtin" = "#e06c75"

[options]
"ui.line-number.relative" = true
"ui.nerd-fonts" = true
font = "default"
font_size = 18
cursor_roundness = 2
picker_roundness = 16

[langs.rust]
indent = 4
format_on_save = true
use_tabs = false

[langs.markdown]
indent = 0
format_on_save = false
use_tabs = false
