id = "volt-dark"
name = "Volt Dark"

[tokens]
"ui.background" = "#181b22"
"ui.foreground" = "#d7dde8"
"ui.yank-flash" = "#61afef6e"
"syntax.attribute" = "#61afef"
"syntax.comment" = "#5c6370"
"syntax.constant" = "#d19a66"
"syntax.constant.builtin" = "#d19a66"
"syntax.constructor" = "#c678dd"
"syntax.function" = "#61afef"
"syntax.function.macro" = "#56b6c2"
"syntax.keyword" = "#c678dd"
"syntax.label" = "#e06c75"
"syntax.module" = "#e5c07b"
"syntax.operator" = "#56b6c2"
"syntax.property" = "#e06c75"
"syntax.punctuation.bracket" = "#abb2bf"
"syntax.punctuation.delimiter" = "#abb2bf"
"syntax.string" = "#98c379"
"syntax.type" = "#e5c07b"
"syntax.type.builtin" = "#e5c07b"
"syntax.variable" = "#e06c75"
"syntax.variable.builtin" = "#e06c75"

[options]
"ui.line-number.relative" = true
font = "default"
font_size = 18
opacity = 1.0
opacity_type = "transparent"
cursor_roundness = 2
picker_roundness = 16
