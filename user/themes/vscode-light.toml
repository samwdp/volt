id = "vscode-light"
name = "VS Code Light"

[tokens]
"ui.background" = "#ffffff"
"ui.foreground" = "#333333"
"ui.input.background" = "#ffffff"
"ui.input.foreground" = "#333333"
"ui.yank-flash" = "#007acc6e"
"ui.statusline.active" = "#0070c1"
"ui.statusline.inactive" = "#008000"
# Git status
"git.status.section.header" = "#795e26"
"git.status.section.count" = "#008000"
"git.status.header.label" = "#0070c1"
"git.status.header.value" = "#267f99"
"git.status.header.hash" = "#008000"
"git.status.header.summary" = "#333333"
"git.status.in-progress" = "#267f99"
"git.status.entry.added" = "#008000"
"git.status.entry.modified" = "#795e26"
"git.status.entry.deleted" = "#a31515"
"git.status.entry.renamed" = "#af00db"
"git.status.entry.copied" = "#0070c1"
"git.status.entry.updated" = "#267f99"
"git.status.entry.changed" = "#795e26"
"git.status.entry.untracked" = "#a31515"
"git.status.entry.path" = "#333333"
"git.status.commit.hash" = "#008000"
"git.status.commit.summary" = "#333333"
"git.status.stash.name" = "#795e26"
"git.status.stash.summary" = "#333333"
"git.status.command" = "#0070c1"
"git.status.message" = "#008000"
# Git fringe
"git.fringe.added" = "#008000"
"git.fringe.modified" = "#795e26"
"git.fringe.removed" = "#a31515"
"syntax.attribute" = "#001080"
"syntax.comment" = "#008000"
"syntax.constant" = "#0070c1"
"syntax.constant.builtin" = "#0070c1"
"syntax.constructor" = "#267f99"
"syntax.function" = "#795e26"
"syntax.function.macro" = "#af00db"
"syntax.keyword" = "#0000ff"
"syntax.label" = "#0000ff"
"syntax.module" = "#267f99"
"syntax.operator" = "#333333"
"syntax.property" = "#001080"
"syntax.punctuation.bracket" = "#333333"
"syntax.punctuation.delimiter" = "#333333"
"syntax.string" = "#a31515"
"syntax.type" = "#267f99"
"syntax.type.builtin" = "#267f99"
"syntax.variable" = "#001080"
"syntax.variable.builtin" = "#795e26"

[options]
"ui.line-number.relative" = true
"ui.nerd-fonts" = true
font = "default"
font_size = 18
cursor_roundness = 2
picker_roundness = 16

[langs.rust]
indent = 4
format_on_save = true
use_tabs = false

[langs.markdown]
indent = 0
format_on_save = false
use_tabs = false
